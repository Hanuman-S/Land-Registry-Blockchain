<!DOCTYPE html>
<html>
<head>
    <title>Land Registry System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Land Registry System</h1>

<!-- SEARCH -->
<h2>Search Property</h2>
<input type="text" id="searchInput" placeholder="Enter name/village">
<button onclick="search()">Search</button>

<div id="searchResult"></div>

<hr>

<!-- TRANSFER -->
<h2>Transfer Property</h2>

<input type="number" id="parcelId" placeholder="Parcel ID">
<input type="number" id="sellerId" placeholder="Seller ID">
<input type="number" id="buyerId" placeholder="Buyer ID">
<input type="number" id="amount" placeholder="Amount">

<button onclick="transfer()">Transfer</button>

<div id="transferResult"></div>

<hr>

<!-- VERIFY -->
<h2>Verify Blockchain</h2>
<button onclick="verify()">Verify</button>

<div id="verifyResult"></div>

</body>

<script src="script.js"></script>
</html>
